    <main>
        <section class="seccion-productos">
            <div class="container-productos">

                <h2 id="titulo-categoria" class="titulo-seccion">Productos</h2>

                <div id="productos-categoria" class="productos-grid"></div>
                <template id="template-card">
                    <div class="card-body">
                        <img class="card-img" src="" alt="">
                        <h3 class="card-name"></h3>
                        <p class="card-desc"></p>
                        <p class="card-price"></p>
                        <button class="card-button add-to-cart" type="button">Agregar al carrito</button>
                    </div>
                </template>
            </div>
        </section>

        <section class="seccion-carrito">
            <div class="contenedor-carrito">
                <h2 class="titulo-carrito">Mi Carrito</h2>


                <div id="carrito-lista" class="lista-carrito">

                    <p class="carrito-vacio">El carrito está vacío</p>
                </div>


                <div class="carrito-footer">
                    <p class="carrito-total">Total: $<span id="total-valor">0</span></p>
                    <button id="boton-vaciar" class="boton-vaciar">Vaciar Carrito</button>
                </div>
            </div>
        </section>
        <template id="template-carrito">
            <div class="producto-carrito">
                <img class="imagen-producto-carrito" src="" alt="">
                <div class="info-producto-carrito">
                    <h4 class="nombre-producto-carrito"></h4>
                    <p class="detalle-producto-carrito"></p>
                    <p class="subtotal-producto-carrito"></p>
                </div>
                <div class="botones-producto-carrito">
                    <button class="boton-quitar-uno">−</button>
                    <button class="boton-eliminar-todo">✕</button>
                </div>
            </div>
        </template>

        <!-- Formulario de envío -->
        <template id="template-formulario-envio">
            <div class="modal-overlay" id="modal-envio">
                <div class="modal-contenido">
                    <h3 class="modal-titulo">Datos de Envío</h3>
                    <p class="modal-subtitulo">Completá los datos para finalizar la compra</p>

                    <form id="formulario-envio" class="formulario-envio">
                        <div class="campo-formulario">
                            <label for="nombre">Nombre completo *</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                            <span class="error-campo" id="error-nombre"></span>
                        </div>

                        <div class="campo-formulario">
                            <label for="email">Correo electrónico *</label>
                            <input type="email" id="email" name="email" placeholder="Ej: juan@email.com" required>
                            <span class="error-campo" id="error-email"></span>
                        </div>

                        <div class="campo-formulario">
                            <label for="telefono">Teléfono *</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 1123456789" required>
                            <span class="error-campo" id="error-telefono"></span>
                        </div>

                        <div class="campo-formulario">
                            <label for="direccion">Dirección de envío *</label>
                            <input type="text" id="direccion" name="direccion" placeholder="Calle y número" required>
                            <span class="error-campo" id="error-direccion"></span>
                        </div>

                        <div class="fila-dos-columnas">
                            <div class="campo-formulario">
                                <label for="ciudad">Ciudad *</label>
                                <input type="text" id="ciudad" name="ciudad" placeholder="Ej: Buenos Aires" required>
                                <span class="error-campo" id="error-ciudad"></span>
                            </div>

                            <div class="campo-formulario">
                                <label for="codigo-postal">Código Postal *</label>
                                <input type="text" id="codigo-postal" name="codigo-postal" placeholder="Ej: 1000"
                                    required>
                                <span class="error-campo" id="error-codigo-postal"></span>
                            </div>
                        </div>

                        <div class="campo-formulario">
                            <label for="notas">Notas adicionales (opcional)</label>
                            <textarea id="notas" name="notas" rows="3"
                                placeholder="Ej: Dejar en recepción, timbre 3"></textarea>
                        </div>

                        <div class="resumen-compra-modal">
                            <p><strong>Total a pagar:</strong> $<span id="modal-total">0</span></p>
                        </div>

                        <div class="botones-modal">
                            <button type="button" class="boton-cancelar" id="cancelar-formulario">Cancelar</button>
                            <button type="submit" class="boton-confirmar" id="confirmar-compra">Confirmar
                                Compra</button>
                        </div>
                    </form>
                </div>
            </div>
        </template>

        <template id="template-resumen-compra">
            <div style="text-align: left;">
                <p><strong>Total pagado:</strong> ${total}</p>
                <p><strong>Datos de envío:</strong></p>
                <ul style="list-style: none; padding-left: 0;">
                    <li>👤 {nombre}</li>
                    <li>📧 {email}</li>
                    <li>📞 {telefono}</li>
                    <li>📍 {direccion}, {ciudad} (CP: {codigoPostal})</li>
                    <li>📝 {notas}</li>
                </ul>
            </div>
        </template>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Toman_Tech. All rights reserved.</p>
            </div>
        </footer>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../JS/productos.js"></script>
    <script src="../JS/cart.js"></script>
    <script src="../JS/carga_categoria.js"></script>
